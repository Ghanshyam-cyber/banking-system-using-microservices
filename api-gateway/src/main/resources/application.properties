spring.application.name=api-gateway
server.port=8080
#Enable swagger api
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/docs.html

logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.reactor.netty=DEBUG

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

#configuring routes for user-service
spring.cloud.gateway.server.webflux.routes[0].id=user-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://user-service
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/user/**, /users/**
#configuring routes for account-service
spring.cloud.gateway.server.webflux.routes[1].id=account-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://account-service
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/account/**
#configuring routes for transaction-service
spring.cloud.gateway.server.webflux.routes[2].id=transaction-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://transaction-service
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/transaction/**

#For User Service swagger config
springdoc.swagger-ui.urls[0].name=user-service
springdoc.swagger-ui.urls[0].url=http://localhost:8081/v3/api-docs
#For Account Service swagger config
springdoc.swagger-ui.urls[1].name=account-service
springdoc.swagger-ui.urls[1].url=http://localhost:8082/v3/api-docs
#For Transaction Service swagger config
springdoc.swagger-ui.urls[2].name=transaction-service
springdoc.swagger-ui.urls[2].url=http://localhost:8083/v3/api-docs